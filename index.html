    <!-- ── Ohio Benefit Calculation Engine ────────────────────────────────────
         Sources: docs/ohio-benefit-rules.md (FY2026 rules, retrieved 2026-04-21)
         All income values in annual dollars. Phase-outs as continuous functions. -->
    <script>
      // Federal Poverty Guidelines FY2026 — 48 contiguous states + D.C.
      // Source: HHS/ASPE, Federal Register 2026-01-15
      // https://aspe.hhs.gov/topics/poverty-economic-mobility/poverty-guidelines
      const FPL_BASE_2026 = 15960;
      const FPL_INCREMENT_2026 = 5680;

      function getFPL(familySize) {
        return FPL_BASE_2026 + (Math.max(1, familySize) - 1) * FPL_INCREMENT_2026;
      }

      function getFPLPercent(annualIncome, familySize) {
        return annualIncome / getFPL(familySize);
      }

      // Ohio rule tables
      const OH = {
        // SNAP: USDA FNS FY2026; Ohio JFS (Ohio BBCE)
        // https://www.fns.usda.gov/snap/recipient/eligibility
        // https://www.snapscreener.com/guides/ohio
        snap: {
          grossLimitFPL: 2.00,          // Ohio BBCE: 200% FPL (federal default is 130%)
          netLimitFPL: 1.00,            // 100% FPL net income limit
          // Standard deduction $/month indexed by household size 1–6
          stdDeduction:        [0, 209, 209, 209, 228, 247, 266],
          eidRate: 0.20,                // 20% earned income deduction
          benefitReductionRate: 0.30,   // benefit reduces $0.30 per $1 net income
          // Maximum monthly benefit (Oct 2025 – Sep 2026) by household size
          maxMonthlyBenefit:   [0, 298, 549, 785, 994, 1183, 1419],
        },

        // Medicaid: Ohio Dept. of Medicaid; Ohio expanded 2014
        // https://www.medicaid.gov/state-overviews/stateprofile.html?state=Ohio
        medicaid: {
          expansionFPL: 1.38,  // Adults 19–64: 138% FPL (133% + 5% income disregard)
          childrenFPL: 2.16,   // Children: 216% FPL
          // Dollar proxy for the value of free Medicaid coverage (per adult per year).
          // Represents the marketplace premium cost a family avoids by having Medicaid.
          // Conservative estimate; actual actuarial value for low-income adults is higher.
          adultAnnualValueProxy: 2250, // $/adult/year (2 adults in family of 4 = $4,500)
        },

        // ACA Marketplace: Congress.gov CRS R48290; thefinancebuff.com
        // https://thefinancebuff.com/aca-premium-tax-credit-percentages.html
        // NOTE: ARP/IRA enhanced PTCs expired end of 2025 — standard table applies for 2026.
        //       The 400% FPL subsidy cliff RETURNED in 2026.
        aca: {
          eligibleFPLMin: 1.00,  // Below this → Medicaid eligible; no PTC
          cliffFPL: 4.00,        // Above this → no PTC; hard cliff
          // SLCSP (Second Lowest Cost Silver Plan) benchmark — Ohio estimate 2026
          // Varies by county; central/northeast OH representative values
          slcspMonthly: { 1: 700, 2: 1400, 3: 1750, 4: 2100, 5: 2625, 6: 3150 },
          // Applicable percentage table: [fplFraction, maxContributionPct]
          // PTC = SLCSP_premium - (income × applicablePct). Interpolate linearly.
          pctTable: [
            [1.00, 0.0210],
            [1.33, 0.0314],
            [1.50, 0.0419],
            [2.00, 0.0660],
            [2.50, 0.0844],
            [3.00, 0.0996],
            [4.00, 0.0996],
          ],
        },

        // Ohio PFCC Childcare Subsidy: Ohio DCY; childcarecostfinder.com
        // https://childrenandyouth.ohio.gov/for-providers/resources/pfcc
        pfcc: {
          entryFPL: 1.45,    // New enrollment: ≤145% FPL
          exitFPL: 3.00,     // Continuation exit: ≤300% FPL (enrolled families only)
          coPayRate: 0.07,   // 7% of annual income cap (effective July 2026)
          coPayFreeFPL: 1.00, // Below 100% FPL: $0 co-pay
          // Annual gross childcare value — Ohio 75th percentile market rate
          // Indexed by number of children (0–3)
          childcareValuePerChild: [0, 11000, 23000, 33000],
        },

        // Section 8 / HCV: HUD; Columbus MHA (CMHA)
        // https://www.hud.gov/helping-americans/housing-choice-vouchers-tenants
        // Modeled as inactive by default — Ohio PHAs have closed waitlists.
        section8: {
          incomeLimitAnnual: 52500,     // 50% AMI for Columbus family of 4 (2026 est.)
          paymentStandardMonthly: 1750, // 3BR Columbus 2026 estimate
          tenantShareRate: 0.30,
        },
      };

      // ── SNAP ───────────────────────────────────────────────────────────────
      // Graduated phase-out — not a binary cliff. $0.30 reduction per $1 net income.
      function calcSnap(annualIncome, familySize) {
        const fpl = getFPL(familySize);
        const size = Math.min(Math.max(1, familySize), 6);
        const grossMonthly = annualIncome / 12;

        // Gross income test (Ohio BBCE: 200% FPL)
        if (annualIncome > fpl * OH.snap.grossLimitFPL) return 0;

        const stdDed = OH.snap.stdDeduction[size];
        const eid = grossMonthly * OH.snap.eidRate;
        const netMonthly = Math.max(0, grossMonthly - stdDed - eid);

        // Net income test (100% FPL)
        if (netMonthly > fpl / 12) return 0;

        const maxBenefit = OH.snap.maxMonthlyBenefit[size];
        const monthly = Math.max(0, maxBenefit - Math.round(netMonthly * OH.snap.benefitReductionRate));
        return monthly * 12;
      }

      // ── ACA applicable percentage (piecewise linear interpolation) ─────────
      function _acaApplicablePct(fplFraction) {
        const t = OH.aca.pctTable;
        if (fplFraction <= t[0][0]) return t[0][1];
        if (fplFraction >= t[t.length - 1][0]) return t[t.length - 1][1];
        for (let i = 1; i < t.length; i++) {
          if (fplFraction <= t[i][0]) {
            const [x0, y0] = t[i - 1], [x1, y1] = t[i];
            return y0 + (y1 - y0) * (fplFraction - x0) / (x1 - x0);
          }
        }
        return t[t.length - 1][1];
      }

      // ── ACA Premium Cost (annual expense, positive value) ──────────────────
      // Hard cliff at 400% FPL: below = subsidised; above = full premium.
      function calcACAPremium(annualIncome, familySize) {
        const fpl = getFPL(familySize);
        const fplFraction = annualIncome / fpl;
        const size = Math.min(Math.max(1, familySize), 6);
        const slcspAnnual = (OH.aca.slcspMonthly[size] || OH.aca.slcspMonthly[6]) * 12;

        // Below 100% FPL → Medicaid; no ACA cost
        if (fplFraction < OH.aca.eligibleFPLMin) return 0;
        // Above 400% FPL → no PTC; pay full premium (hard cliff). At exactly 400% PTC still applies.
        if (fplFraction > OH.aca.cliffFPL) return slcspAnnual;

        const contribution = Math.round(annualIncome * _acaApplicablePct(fplFraction));
        return Math.min(contribution, slcspAnnual);
      }

      // ── Medicaid Value (annual dollar proxy for free coverage) ─────────────
      // Binary cliff at 138% FPL for adults. Children eligible to 216% FPL.
      // Value proxy = avoided insurance cost (adults × adultAnnualValueProxy).
      function calcMedicaidValue(annualIncome, familySize, adultCount) {
        const fpl = getFPL(familySize);
        if (annualIncome / fpl <= OH.medicaid.expansionFPL) {
          const adults = Math.max(1, Math.min(adultCount, familySize));
          return adults * OH.medicaid.adultAnnualValueProxy;
        }
        return 0;
      }

      // ── PFCC Childcare Subsidy ─────────────────────────────────────────────
      // Entry cliff at 145% FPL. Enrolled families exit at 300% FPL.
      // numChildren = familySize - adultCount (supports single-parent households).
      function calcChildcareSubsidy(annualIncome, familySize, pfccEnrolled, adultCount) {
        const fpl = getFPL(familySize);
        const fplFraction = annualIncome / fpl;
        const numChildren = Math.max(0, familySize - adultCount);
        const idx = Math.min(numChildren, OH.pfcc.childcareValuePerChild.length - 1);
        const grossValue = OH.pfcc.childcareValuePerChild[idx];

        if (grossValue === 0) return 0;

        // Entry: ≤145% FPL. Continuation for enrolled: ≤300% FPL.
        const eligible = fplFraction <= OH.pfcc.entryFPL ||
                         (pfccEnrolled && fplFraction <= OH.pfcc.exitFPL);
        if (!eligible) return 0;

        const coPay = fplFraction <= OH.pfcc.coPayFreeFPL
          ? 0
          : Math.round(annualIncome * OH.pfcc.coPayRate);
        return Math.max(0, grossValue - coPay);
      }

      // ── Section 8 / HCV Value ──────────────────────────────────────────────
      // Returns $0 by default (waitlist-based; most Ohio families don't have a voucher).
      function calcSection8Value(annualIncome, familySize, hasVoucher) {
        if (!hasVoucher) return 0;
        if (annualIncome > OH.section8.incomeLimitAnnual) return 0;
        const tenantShare = (annualIncome / 12) * OH.section8.tenantShareRate;
        return Math.max(0, Math.round((OH.section8.paymentStandardMonthly - tenantShare) * 12));
      }

      // ── Effective Take-Home ────────────────────────────────────────────────
      // Returns breakdown + totalEffective for any income across all programs.
      // opts: { pfccEnrolled: bool, hasVoucher: bool }
      function calcEffectiveTakeHome(annualIncome, familySize, opts) {
        const { pfccEnrolled = false, hasVoucher = false, adultCount = 2 } = opts || {};
        const onMedicaid = annualIncome / getFPL(familySize) <= OH.medicaid.expansionFPL;

        const snapValue      = calcSnap(annualIncome, familySize);
        const medicaidValue  = onMedicaid ? calcMedicaidValue(annualIncome, familySize, adultCount) : 0;
        const acaCost        = onMedicaid ? 0 : calcACAPremium(annualIncome, familySize);
        const section8Value  = calcSection8Value(annualIncome, familySize, hasVoucher);
        const childcareValue = calcChildcareSubsidy(annualIncome, familySize, pfccEnrolled, adultCount);

        const totalEffective = Math.round(
          annualIncome + snapValue + medicaidValue + section8Value + childcareValue - acaCost
        );

        return { grossWages: annualIncome, snapValue, medicaidValue, acaCost,
                 section8Value, childcareValue, totalEffective };
      }

      // ── Cliff Chart Data ───────────────────────────────────────────────────
      // 121 points: $0 to $120,000 in $1,000 increments.
      // opts: same as calcEffectiveTakeHome
      function getCliffChartData(familySize, opts) {
        const points = [];
        for (let income = 0; income <= 120000; income += 1000) {
          points.push({ income, ...calcEffectiveTakeHome(income, familySize, opts) });
        }
        return points;
      }

      // ── Keisha Validation ──────────────────────────────────────────────────
      // Keisha: Ohio, family of 4, current wages $44K, offered $70K.
      // NOTE: Product brief cited wages=$54K but engine analysis (task-2) showed
      // $54K is above all Ohio benefit thresholds. $44K is the correct demo wage
      // where SNAP + Medicaid + PFCC childcare are all active simultaneously.
      (function validateKeisha() {
        // Case 1: Keisha — family of 4, 2 adults, 2 children (default scenario)
        const current = calcEffectiveTakeHome(44000, 4, { adultCount: 2 });
        const offered  = calcEffectiveTakeHome(70000, 4, { adultCount: 2 });
        const netDiff  = offered.totalEffective - current.totalEffective;

        // currentEffective ~$70,604 — wages + SNAP($2,184) + Medicaid($4,500) + PFCC($19,920)
        console.assert(current.totalEffective >= 68000 && current.totalEffective <= 73000,
          'Keisha current effective out of range', current.totalEffective);

        // netDiff ~-$5,536 — the $26K raise leaves Keisha $5.5K worse off
        console.assert(netDiff >= -8000 && netDiff <= -3000,
          'Keisha netDiff out of range', netDiff);

        // safeExit ~$79,000 — first income where effective exceeds current + $2K
        let safeExit = null;
        for (let i = 70000; i <= 120000; i += 1000) {
          if (calcEffectiveTakeHome(i, 4, { adultCount: 2 }).totalEffective > current.totalEffective + 2000) {
            safeExit = i;
            break;
          }
        }
        console.assert(safeExit >= 78000 && safeExit <= 86000,
          'Keisha safeExit out of range', safeExit);

        console.log('[CliffCheck] Keisha (2-adult) PASSED', {
          currentEffective: current.totalEffective,
          offeredEffective: offered.totalEffective,
          netDiff,
          safeExit,
        });

        // Case 2: Single-parent — family of 4, 1 adult, 3 children
        // SNAP allotment should be higher (more children), childcare covers 3 kids
        const spCurrent = calcEffectiveTakeHome(44000, 4, { adultCount: 1 });
        // Medicaid value should be 1 adult proxy ($2,250) not 2 ($4,500)
        console.assert(spCurrent.medicaidValue === OH.medicaid.adultAnnualValueProxy,
          'Single-parent Medicaid should be 1-adult proxy', spCurrent.medicaidValue);
        // PFCC childcare should cover 3 children (idx=3, $33,000 gross value)
        console.assert(spCurrent.childcareValue > 20000,
          'Single-parent childcare should cover 3 children', spCurrent.childcareValue);
        console.log('[CliffCheck] Single-parent (1-adult) PASSED', {
          currentEffective: spCurrent.totalEffective,
          medicaidValue: spCurrent.medicaidValue,
          childcareValue: spCurrent.childcareValue,
        });

        // Case 3: Voucher holder — family of 3, $30K income
        // Subsidy should be positive and decline as income rises
        const vCurrent = calcEffectiveTakeHome(30000, 3, { adultCount: 2, hasVoucher: true });
        const vHigher  = calcEffectiveTakeHome(50000, 3, { adultCount: 2, hasVoucher: true });
        console.assert(vCurrent.section8Value > 0,
          'Voucher holder at $30K should have positive subsidy', vCurrent.section8Value);
        console.assert(vHigher.section8Value < vCurrent.section8Value,
          'Voucher subsidy should decline as income rises', { low: vCurrent.section8Value, high: vHigher.section8Value });
        console.log('[CliffCheck] Section 8 voucher PASSED', {
          at30k: vCurrent.section8Value,
          at50k: vHigher.section8Value,
        });
      })();
    </script>

    <!-- React + TinyBase globals for Babel JSX -->
    <script type="module">
      import * as React from "react";
      import * as ReactDOM from "react-dom/client";
      window.React = React;

    <!-- APP_CODE -->
    <script type="text/babel" data-type="module">
      import { createStore } from 'tinybase';
      import { createLocalPersister } from 'tinybase/persisters/persister-browser';
      import { Provider, useCell } from 'tinybase/ui-react';

      const { useState, useEffect, useMemo, useRef } = React;

      // ── Store (module-level singleton) ──
      const store = createStore();
      const DEFAULTS = { state: 'OH', familySize: 4, currentIncome: 44000, offeredIncome: 70000, adultCount: 2, hasSection8Voucher: false };

      // ── Helpers ──
      function fmtDollars(n) {
        return '$' + Math.round(Math.abs(n)).toLocaleString();
      }

      // ── TrustBadge ──
      function TrustBadge() {
        return (
          <div className="bg-stone-100 border-b border-stone-200 py-2.5 text-center">
            <p className="text-xs text-stone-500">
              🔒 Your data stays on this device — nothing is sent anywhere
            </p>
          </div>
        );
      }

      // ── CurrencyInput ──
      // Shows formatted "$X,XXX" when unfocused. Raw number while focused for easy editing.
      function CurrencyInput({ id, value, onChange, placeholder }) {
        const [focused, setFocused] = useState(false);
        const [raw, setRaw] = useState('');

        const display = focused ? raw : (value ? fmtDollars(value) : '');

        function handleChange(e) {
          const str = e.target.value;
          setRaw(str);
          const n = parseInt(str.replace(/[^0-9]/g, ''), 10) || 0;
          onChange(n);
        }

        function handleBlur(e) {
          setFocused(false);
          const n = parseInt(e.target.value.replace(/[^0-9]/g, ''), 10) || 0;
          onChange(n);
        }

        return (
          <input
            id={id}
            type="text"
            inputMode="numeric"
            value={display}
            placeholder={placeholder}
            onFocus={() => { setFocused(true); setRaw(value ? String(value) : ''); }}
            onBlur={handleBlur}
            onChange={handleChange}
            className="w-full h-12 px-3 bg-white border border-stone-200 rounded-lg text-stone-900 text-base focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-amber-400"
          />
        );
      }

      // ── ProfileForm ──
      function ProfileForm() {
        const familySize       = useCell('profile', 'current', 'familySize')       ?? DEFAULTS.familySize;
        const currentIncome    = useCell('profile', 'current', 'currentIncome')    ?? DEFAULTS.currentIncome;
        const offeredIncome    = useCell('profile', 'current', 'offeredIncome')    ?? DEFAULTS.offeredIncome;
        const adultCount       = useCell('profile', 'current', 'adultCount')       ?? DEFAULTS.adultCount;
        const hasSection8Voucher = useCell('profile', 'current', 'hasSection8Voucher') ?? DEFAULTS.hasSection8Voucher;

        return (
          <div className="bg-white rounded-2xl border border-stone-200 p-5 mt-6">
            <h2 className="text-base font-semibold text-stone-800 mb-5">Your situation</h2>

            {/* State — Ohio only for now */}
            <div className="mb-4">
              <label className="block text-sm font-medium text-stone-700 mb-1.5">State</label>
              <div className="flex items-center h-12 px-3 bg-stone-50 border border-stone-200 rounded-lg text-stone-400 text-sm select-none">
                Ohio — more states coming
              </div>
            </div>

            {/* Family size */}
            <div className="mb-4">
              <label htmlFor="familySize" className="block text-sm font-medium text-stone-700 mb-1.5">
                Family size
              </label>
              <select
                id="familySize"
                value={familySize}
                onChange={e => store.setCell('profile', 'current', 'familySize', Number(e.target.value))}
                className="w-full h-12 px-3 bg-white border border-stone-200 rounded-lg text-stone-900 text-base focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-amber-400"
              >
                {[1,2,3,4,5,6,7,8].map(n => (
                  <option key={n} value={n}>{n} {n === 1 ? 'person' : 'people'}</option>
                ))}
              </select>
            </div>

            {/* Adults in household */}
            <div className="mb-4">
              <label className="block text-sm font-medium text-stone-700 mb-1.5">Adults in household</label>
              <div className="flex gap-3">
                {[1, 2].map(n => (
                  <button
                    key={n}
                    type="button"
                    onClick={() => store.setCell('profile', 'current', 'adultCount', n)}
                    className={`flex-1 h-12 rounded-lg border text-sm font-medium transition-colors ${
                      Number(adultCount) === n
                        ? 'bg-amber-400 border-amber-400 text-stone-900'
                        : 'bg-white border-stone-200 text-stone-700 hover:border-amber-300'
                    }`}
                  >
                    {n === 1 ? '1 — single parent' : '2 — two adults'}
                  </button>
                ))}
              </div>
            </div>

            {/* Current wages */}
            <div className="mb-4">
              <label htmlFor="currentIncome" className="block text-sm font-medium text-stone-700 mb-1.5">
                Current annual wages
              </label>
              <CurrencyInput
                id="currentIncome"
                value={currentIncome}
                onChange={v => store.setCell('profile', 'current', 'currentIncome', v)}
                placeholder="e.g. $44,000"
              />
            </div>

            {/* Offered wages */}
            <div className="mb-4">
              <label htmlFor="offeredIncome" className="block text-sm font-medium text-stone-700 mb-1.5">
                Offered or target annual wages
              </label>
              <CurrencyInput
                id="offeredIncome"
                value={offeredIncome}
                onChange={v => store.setCell('profile', 'current', 'offeredIncome', v)}
                placeholder="e.g. $70,000"
              />
            </div>

            {/* Section 8 voucher */}
            <div>
              <label className="flex items-center gap-3 cursor-pointer">
                <input
                  type="checkbox"
                  checked={!!hasSection8Voucher}
                  onChange={e => store.setCell('profile', 'current', 'hasSection8Voucher', e.target.checked)}
                  className="w-5 h-5 rounded border-stone-300 accent-amber-500"
                />
                <span className="text-sm text-stone-700">I have a Section 8 / Housing Choice Voucher</span>
              </label>
            </div>
          </div>
        );
      }

      // ── LiveSummary ──
      function LiveSummary() {
        const familySize       = useCell('profile', 'current', 'familySize')       ?? DEFAULTS.familySize;
        const currentIncome    = useCell('profile', 'current', 'currentIncome')    ?? DEFAULTS.currentIncome;
        const offeredIncome    = useCell('profile', 'current', 'offeredIncome')    ?? DEFAULTS.offeredIncome;
        const adultCount       = useCell('profile', 'current', 'adultCount')       ?? DEFAULTS.adultCount;
        const hasSection8Voucher = useCell('profile', 'current', 'hasSection8Voucher') ?? DEFAULTS.hasSection8Voucher;

        const opts = { adultCount: Number(adultCount), hasVoucher: !!hasSection8Voucher };

        const current = useMemo(
          () => calcEffectiveTakeHome(Number(currentIncome), Number(familySize), opts),
          [currentIncome, familySize, adultCount, hasSection8Voucher]
        );
        const offered = useMemo(
          () => calcEffectiveTakeHome(Number(offeredIncome), Number(familySize), opts),
          [offeredIncome, familySize, adultCount, hasSection8Voucher]
        );

        const diff = offered.totalEffective - current.totalEffective;
        const isWorse  = diff < -500;
        const isBetter = diff > 500;

        const raiseAmount = Number(offeredIncome) - Number(currentIncome);

        const safeExit = useMemo(() => {
          const data = getCliffChartData(Number(familySize), opts);
          const baseline = current.totalEffective;
          for (let i = data.length - 1; i >= 0; i--) {
            if (data[i].totalEffective < baseline) {
              if (i + 1 < data.length && data[i + 1].income > Number(currentIncome)) {
                return data[i + 1].income;
              }
              break;
            }
          }
          return null;
        }, [familySize, currentIncome, adultCount, hasSection8Voucher]);

        // Per-benefit deltas (monthly, for breakdown display)
        const breakdown = isWorse ? [
          { label: 'SNAP',      delta: Math.round((offered.snapValue      - current.snapValue)      / 12) },
          { label: 'Medicaid',  delta: Math.round((offered.medicaidValue  - current.medicaidValue)  / 12) },
          { label: 'ACA cost',  delta: Math.round((offered.acaCost        - current.acaCost)        / 12) },
          { label: 'Childcare', delta: Math.round((offered.childcareValue - current.childcareValue) / 12) },
          ...(opts.hasVoucher ? [{ label: 'Section 8', delta: Math.round((offered.section8Value - current.section8Value) / 12) }] : []),
        ].filter(b => b.delta !== 0) : [];

        return (
          <div className="mt-4 bg-white rounded-2xl border border-stone-200 p-5">
            <div className="flex gap-4">
              <div className="flex-1 min-w-0">
                <p className="text-xs font-medium text-stone-400 uppercase tracking-wide leading-none">
                  Take-home today
                </p>
                <p className="text-3xl font-extrabold text-stone-900 mt-2 leading-none"
                   style={{fontVariantNumeric: 'tabular-nums'}}>
                  {fmtDollars(current.totalEffective)}
                </p>
                <p className="text-xs text-stone-400 mt-1.5">/yr including benefits</p>
              </div>
              <div className="flex-1 min-w-0 text-right">
                <p className="text-xs font-medium text-stone-400 uppercase tracking-wide leading-none">
                  After the offer
                </p>
                <p className={`text-3xl font-extrabold mt-2 leading-none ${
                    isWorse ? 'text-red-600' : isBetter ? 'text-green-700' : 'text-stone-900'
                  }`}
                   style={{fontVariantNumeric: 'tabular-nums'}}>
                  {fmtDollars(offered.totalEffective)}
                </p>
                <p className={`text-sm font-semibold mt-1.5 ${
                    isWorse ? 'text-red-600' : isBetter ? 'text-green-600' : 'text-stone-400'
                  }`}
                   style={{fontVariantNumeric: 'tabular-nums'}}>
                  {isWorse ? '−' : isBetter ? '+' : '—'}{isWorse || isBetter ? fmtDollars(diff) + '/yr' : 'no change'}
                </p>
              </div>
            </div>

            {isWorse && (
              <div className="mt-4 p-3.5 bg-red-50 rounded-xl border border-red-200">
                <p className="text-base font-bold text-stone-900 leading-snug" style={{fontVariantNumeric:'tabular-nums'}}>
                  {raiseAmount > 0
                    ? <>Your {fmtDollars(raiseAmount)} raise makes you {fmtDollars(Math.abs(diff))} poorer.</>
                    : <>This offer makes you {fmtDollars(Math.abs(diff))} worse off than today.</>}
                  {safeExit ? <> You'd need at least {fmtDollars(safeExit)}/yr to break even.</> : null}
                </p>
                <p className="text-xs text-red-600 mt-1.5">
                  Benefits phase out faster than your wages grow.
                </p>
                {breakdown.length > 0 && (
                  <div className="mt-2.5 pt-2.5 border-t border-red-200 space-y-1">
                    {breakdown.map(({ label, delta }) => {
                      // For ACA cost: positive delta = new/higher cost = bad
                      // For others: negative delta = loss = bad
                      const isLoss = label === 'ACA cost' ? delta > 0 : delta < 0;
                      const sign   = label === 'ACA cost' ? (delta > 0 ? '+' : '−') : (delta < 0 ? '−' : '+');
                      return (
                        <p key={label} className={`text-xs font-medium ${isLoss ? 'text-red-600' : 'text-stone-500'}`}
                           style={{fontVariantNumeric: 'tabular-nums'}}>
                          {label} {sign}${Math.abs(delta).toLocaleString()}/mo
                        </p>
                      );
                    })}
                  </div>
                )}
              </div>
            )}
            {isWorse && safeExit && (
              <div className="mt-3 p-4 bg-green-50 rounded-xl border border-green-200">
                <p className="text-xs font-semibold text-green-600 uppercase tracking-wide">Your negotiation target</p>
                <p className="text-3xl font-extrabold text-green-700 mt-1 leading-none"
                   style={{fontVariantNumeric:'tabular-nums'}}>
                  {fmtDollars(safeExit)}/yr
                </p>
                <p className="text-sm text-green-700 mt-1.5">
                  To come out ahead, ask for at least this.
                </p>
              </div>
            )}
            {isBetter && (
              <div className="mt-4 p-3.5 bg-green-50 rounded-xl border border-green-200">
                <p className="text-sm font-semibold text-green-700">
                  ✓ This raise improves your total value by {fmtDollars(diff)}/yr
                </p>
              </div>
            )}
          </div>
        );
      }

      // ── Chart.js plugin: zone fills + vertical income markers ──
      const cliffChartPlugin = {
        id: 'cliffChartPlugin',
        beforeDatasetsDraw(chart) {
          const { ctx, chartArea, scales } = chart;
          const pts = chart.data.datasets[0].data;
          if (!pts || pts.length < 2) return;
          for (let i = 0; i < pts.length - 1; i++) {
            const dy = pts[i + 1].y - pts[i].y;
            // green = rising, red = cliff drop, amber = flat/transitional
            ctx.fillStyle = dy > 500
              ? 'rgba(220,252,231,0.28)'
              : dy < -200
                ? 'rgba(254,226,226,0.72)'
                : 'rgba(231,229,228,0.18)';
            const x0 = scales.x.getPixelForValue(pts[i].x);
            const x1 = scales.x.getPixelForValue(pts[i + 1].x);
            ctx.fillRect(x0, chartArea.top, x1 - x0, chartArea.height);
          }
        },
        afterDatasetsDraw(chart, _args, opts) {
          const { ctx, chartArea, scales } = chart;
          (opts.lines || []).forEach(({ x, color, label, dash }) => {
            if (x < 0 || x > 120000) return;
            const xpx = scales.x.getPixelForValue(x);
            ctx.save();
            ctx.strokeStyle = color;
            ctx.lineWidth = 1.5;
            ctx.setLineDash(dash || [5, 4]);
            ctx.beginPath();
            ctx.moveTo(xpx, chartArea.top);
            ctx.lineTo(xpx, chartArea.bottom);
            ctx.stroke();
            if (label) {
              ctx.setLineDash([]);
              ctx.font = 'bold 10px system-ui,sans-serif';
              const tw = ctx.measureText(label).width;
              const pad = 4, lh = 14;
              const lx = Math.min(Math.max(xpx - tw / 2 - pad, chartArea.left), chartArea.right - tw - pad * 2);
              ctx.fillStyle = 'rgba(255,255,255,0.9)';
              ctx.fillRect(lx, chartArea.top + 3, tw + pad * 2, lh);
              ctx.fillStyle = color;
              ctx.fillText(label, lx + pad, chartArea.top + lh);
            }
            ctx.restore();
          });

          // Cliff drop annotation — biggest single-step loss
          if (opts.cliffAnnotation && opts.cliffAnnotation.dy < -500) {
            const { midX, bottomY, dropAmt } = opts.cliffAnnotation;
            if (midX >= 0 && midX <= 120000) {
              const xpx = scales.x.getPixelForValue(midX);
              const ypx = scales.y.getPixelForValue(bottomY);
              const label = '−$' + dropAmt.toLocaleString();
              ctx.save();
              ctx.font = 'bold 11px system-ui,sans-serif';
              const tw = ctx.measureText(label).width;
              const pad = 5, lh = 16;
              const lx = Math.min(Math.max(xpx - tw / 2 - pad, chartArea.left + 2), chartArea.right - tw - pad * 2 - 2);
              const ly = Math.min(ypx + 6, chartArea.bottom - lh - 4);
              ctx.fillStyle = 'rgba(220,38,38,0.12)';
              ctx.fillRect(lx, ly, tw + pad * 2, lh);
              ctx.fillStyle = '#DC2626';
              ctx.fillText(label, lx + pad, ly + lh - 3);
              ctx.restore();
            }
          }
        },
      };

      // ── CliffChart ──
      function CliffChart() {
        const canvasRef = useRef(null);
        const chartRef  = useRef(null);

        const familySize       = useCell('profile', 'current', 'familySize')       ?? DEFAULTS.familySize;
        const currentIncome    = useCell('profile', 'current', 'currentIncome')    ?? DEFAULTS.currentIncome;
        const offeredIncome    = useCell('profile', 'current', 'offeredIncome')    ?? DEFAULTS.offeredIncome;
        const adultCount       = useCell('profile', 'current', 'adultCount')       ?? DEFAULTS.adultCount;
        const hasSection8Voucher = useCell('profile', 'current', 'hasSection8Voucher') ?? DEFAULTS.hasSection8Voucher;

        const opts = { adultCount: Number(adultCount), hasVoucher: !!hasSection8Voucher };

        const { pts, currentResult, offeredResult, safeExit, yMin, cliffAnnotation } = useMemo(() => {
          const data = getCliffChartData(Number(familySize), opts);
          const pts  = data.map(d => ({ x: d.income, y: d.totalEffective }));
          const currentResult = calcEffectiveTakeHome(Number(currentIncome), Number(familySize), opts);
          const offeredResult = calcEffectiveTakeHome(Number(offeredIncome), Number(familySize), opts);

          // Safe exit = minimum income past ALL cliffs where effective permanently exceeds baseline.
          // Scan from high to low: find last income below baseline, safe exit = next income up.
          let safeExit = null;
          const seBaseline = currentResult.totalEffective;
          for (let i = data.length - 1; i >= 0; i--) {
            if (data[i].totalEffective < seBaseline) {
              if (i + 1 < data.length && data[i + 1].income > Number(currentIncome)) {
                safeExit = data[i + 1].income;
              }
              break;
            }
          }

          // Y-axis min: zoom to relevant range
          const minY = Math.min(...pts.map(p => p.y));
          const yMin = Math.max(0, Math.floor((minY - 6000) / 5000) * 5000);

          // Biggest single-step cliff drop for annotation
          let cliffAnnotation = null;
          for (let i = 0; i < pts.length - 1; i++) {
            const dy = pts[i+1].y - pts[i].y;
            if (!cliffAnnotation || dy < cliffAnnotation.dy) {
              cliffAnnotation = {
                midX: (pts[i].x + pts[i+1].x) / 2,
                bottomY: pts[i+1].y,
                dy,
                dropAmt: Math.round(Math.abs(dy)),
              };
            }
          }

          return { pts, currentResult, offeredResult, safeExit, yMin, cliffAnnotation };
        }, [familySize, currentIncome, offeredIncome, adultCount, hasSection8Voucher]);

        useEffect(() => {
          if (!canvasRef.current) return;
          if (chartRef.current) chartRef.current.destroy();

          const lines = [
            { x: Number(currentIncome), color: '#2563EB', label: 'You now', dash: [6, 4] },
            { x: Number(offeredIncome), color: '#7C3AED', label: 'Offer',   dash: [6, 4] },
          ];
          if (safeExit) lines.push({ x: safeExit, color: '#16A34A', label: 'Safe exit', dash: [4, 3] });

          chartRef.current = new Chart(canvasRef.current, {
            type: 'line',
            data: {
              datasets: [{
                data: pts,
                borderWidth: 2.5,
                pointRadius: 0,
                pointHoverRadius: 5,
                pointHoverBackgroundColor: '#44403C',
                tension: 0,
                fill: false,
                segment: {
                  borderColor: ctx => {
                    const dy = ctx.p1.parsed.y - ctx.p0.parsed.y;
                    if (dy < -200) return '#DC2626'; // cliff drop
                    if (dy > 500)  return '#16A34A'; // benefit gains
                    return '#78716C';                // neutral wage growth
                  },
                },
              }],
            },
            options: {
              responsive: true,
              maintainAspectRatio: true,
              aspectRatio: 2,
              animation: false,
              plugins: {
                legend: { display: false },
                tooltip: {
                  callbacks: {
                    title: ctx => '$' + Number(ctx[0].parsed.x).toLocaleString() + '/yr wages',
                    label: ctx => 'Effective take-home: $' + Math.round(ctx.parsed.y).toLocaleString(),
                  },
                },
                cliffChartPlugin: { lines, cliffAnnotation },
              },
              scales: {
                x: {
                  type: 'linear',
                  min: 0,
                  max: 120000,
                  ticks: {
                    stepSize: 20000,
                    callback: v => '$' + (v / 1000) + 'k',
                    font: { size: 11, family: 'system-ui' },
                    color: '#A8A29E',
                    maxTicksLimit: 7,
                  },
                  grid: { color: 'rgba(231,229,228,0.6)' },
                  border: { display: false },
                },
                y: {
                  min: yMin,
                  ticks: {
                    callback: v => '$' + (v / 1000).toFixed(0) + 'k',
                    font: { size: 11, family: 'system-ui' },
                    color: '#A8A29E',
                    maxTicksLimit: 6,
                  },
                  grid: { color: 'rgba(231,229,228,0.6)' },
                  border: { display: false },
                },
              },
            },
            plugins: [cliffChartPlugin],
          });

          return () => { if (chartRef.current) chartRef.current.destroy(); };
        }, [pts, currentIncome, offeredIncome, safeExit, yMin, cliffAnnotation]);

        const diff    = offeredResult.totalEffective - currentResult.totalEffective;
        const isWorse = diff < -500;

        return (
          <div className="mt-4 bg-white rounded-2xl border border-stone-200 p-5">
            <h2 className="text-base font-semibold text-stone-800 mb-3">
              Benefits cliff — Ohio, {Number(familySize)} {Number(familySize) === 1 ? 'person' : 'people'}
            </h2>
            <canvas ref={canvasRef} />

            {/* Marker legend */}
            <div className="flex flex-wrap gap-x-4 gap-y-1 mt-3">
              {[
                { color: 'bg-blue-600',   label: 'You now' },
                { color: 'bg-violet-600', label: 'Offer' },
                ...(safeExit ? [{ color: 'bg-green-600', label: 'Safe exit' }] : []),
              ].map(({ color, label }) => (
                <span key={label} className="flex items-center gap-1.5 text-xs text-stone-500">
                  <span className={`inline-block w-3 h-0.5 rounded ${color}`} />
                  {label}
                </span>
              ))}
            </div>

            {/* Cliff alert */}
            {isWorse && (
              <div className="mt-4 p-3.5 bg-red-50 rounded-xl border border-red-200">
                <p className="text-sm font-semibold text-red-700">
                  ⚠ Taking this offer costs you {fmtDollars(Math.abs(diff))}/yr
                </p>
                <p className="text-xs text-red-600 mt-1">Benefits phase out faster than your wages grow.</p>
              </div>
            )}

            {/* Safe exit callout */}
            {safeExit && (
              <div className="mt-3 p-3.5 bg-green-50 rounded-xl border border-green-200">
                <p className="text-sm font-semibold text-green-700">
                  Safe exit: ${safeExit.toLocaleString()}/yr
                </p>
                <p className="text-xs text-green-700 mt-1">
                  First income past all benefit cliffs where you stay ahead of today.
                </p>
              </div>
            )}
          </div>
        );
      }

      // ── ManagerBrief ──
      function ManagerBrief() {
        const familySize       = useCell('profile', 'current', 'familySize')       ?? DEFAULTS.familySize;
        const currentIncome    = useCell('profile', 'current', 'currentIncome')    ?? DEFAULTS.currentIncome;
        const offeredIncome    = useCell('profile', 'current', 'offeredIncome')    ?? DEFAULTS.offeredIncome;
        const adultCount       = useCell('profile', 'current', 'adultCount')       ?? DEFAULTS.adultCount;
        const hasSection8Voucher = useCell('profile', 'current', 'hasSection8Voucher') ?? DEFAULTS.hasSection8Voucher;
        const [copied, setCopied] = useState(false);

        const opts = { adultCount: Number(adultCount), hasVoucher: !!hasSection8Voucher };

        const { current, offered, safeExit, benefitValue, diff } = useMemo(() => {
          const fs  = Number(familySize);
          const current = calcEffectiveTakeHome(Number(currentIncome), fs, opts);
          const offered = calcEffectiveTakeHome(Number(offeredIncome), fs, opts);
          const benefitValue = current.snapValue + current.medicaidValue
            + current.section8Value + current.childcareValue - current.acaCost;
          const diff = offered.totalEffective - current.totalEffective;
          const data = getCliffChartData(fs, opts);
          let safeExit = null;
          const seBaseline = current.totalEffective;
          for (let i = data.length - 1; i >= 0; i--) {
            if (data[i].totalEffective < seBaseline) {
              if (i + 1 < data.length && data[i + 1].income > Number(currentIncome)) {
                safeExit = data[i + 1].income;
              }
              break;
            }
          }
          return { current, offered, safeExit, benefitValue, diff };
        }, [familySize, currentIncome, offeredIncome, adultCount, hasSection8Voucher]);

        const isWorse = diff < -500;
        const line1 = `Currently earning ${fmtDollars(Number(currentIncome))}/yr with ${fmtDollars(Math.abs(benefitValue))} in annual benefit value — ${fmtDollars(current.totalEffective)} total effective`;
        const line2 = isWorse
          ? `The ${fmtDollars(Number(offeredIncome))} offer would give ${fmtDollars(offered.totalEffective)} total effective — that's ${fmtDollars(Math.abs(diff))} less than today`
          : `The ${fmtDollars(Number(offeredIncome))} offer would give ${fmtDollars(offered.totalEffective)} total effective — ${fmtDollars(diff)} more than today`;
        const line3 = safeExit
          ? `To clear all benefit cliffs, I need ~${fmtDollars(safeExit)}/yr — that's where I permanently stay ahead`
          : `The offered income clears all benefit cliffs — this raise genuinely improves total compensation`;
        const briefText = [line1, line2, line3].join('\n');

        async function handleCopy() {
          try {
            await navigator.clipboard.writeText(briefText);
            setCopied(true);
            setTimeout(() => setCopied(false), 2000);
          } catch (_) {}
        }

        return (
          <div className="mt-4 bg-amber-50 border border-amber-200 rounded-2xl p-5">
            <div className="flex items-start justify-between gap-3 mb-4">
              <div>
                <h2 className="text-base font-semibold text-stone-800">Manager brief</h2>
                <p className="text-xs text-stone-500 mt-0.5">Copy and paste into a message to your manager or HR</p>
              </div>
              <button
                onClick={handleCopy}
                className="shrink-0 text-xs font-semibold px-3 py-2 rounded-lg bg-amber-400 text-stone-900 hover:bg-amber-500 active:bg-amber-600 transition-colors"
              >
                {copied ? '✓ Copied' : 'Copy text'}
              </button>
            </div>
            <ol className="space-y-3">
              {[line1, line2, line3].map((line, i) => (
                <li key={i} className="flex gap-3">
                  <span className="shrink-0 w-5 h-5 rounded-full bg-amber-200 text-amber-900 text-xs font-bold flex items-center justify-center mt-0.5">{i + 1}</span>
                  <p className="text-sm text-stone-700 leading-relaxed">{line}</p>
                </li>
              ))}
            </ol>
          </div>
        );
      }

      // ── App ──
      function App() {
        useEffect(() => {
          const persister = createLocalPersister(store, 'cliffcheck-v1');
          persister.startAutoLoad({ profile: { current: DEFAULTS } })
            .then(() => persister.startAutoSave());
          return () => persister.destroy();
        }, []);

        return (
          <Provider store={store}>
            <div className="min-h-screen bg-stone-50">
              <TrustBadge />
              <div className="max-w-5xl mx-auto px-4 pt-4 pb-6">
                <div className="text-center pt-4 pb-2">
                  <h1 className="text-2xl font-extrabold text-stone-900">CliffCheck</h1>
                  <p className="text-sm text-stone-500 mt-1">
                    See the real cost of a raise — including what you'd lose in benefits
                  </p>
                </div>
                <div className="md:grid md:grid-cols-[2fr_3fr] md:gap-6 md:items-start mt-2">
                  <div>
                    <ProfileForm />
                    <LiveSummary />
                  </div>
                  <div>
                    <CliffChart />
                  </div>
                </div>
                <ManagerBrief />
              </div>
            </div>
          </Provider>
        );
      }

      // ── Mount ──
      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
